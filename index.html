<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Мой ID</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🔐 ID-Портал</h1>

        <div class="info-card">
            <p><strong>Публичный IP:</strong> <span id="ip">Загрузка...</span></p>
            <p><strong>Время:</strong> <span id="time">--:--:--</span></p>
            <p><strong>Дата:</strong> <span id="date">Загрузка...</span></p>
        </div>

        <div class="info-card">
            <p><strong>Браузер:</strong> <span id="browser"></span></p>
            <p><strong>ОС:</strong> <span id="os"></span></p>
            <p><strong>Разрешение:</strong> <span id="resolution"></span></p>
        </div>

        <button id="btn">Показать мой ID</button>
        <div id="user-info"></div>
        <button id="copy-btn" style="display: none;">Скопировать ID</button>

        <button id="theme-toggle">Сменить тему</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
